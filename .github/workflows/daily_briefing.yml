name: Daily Morning Briefing (Free)

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Weekdays — 7:00 UTC = 8:00am UK (GMT) / 9:00am BST
    - cron: '0 7 * * 0,6'   # Weekends — same time
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

permissions:
  contents: write             # Needed to commit the published page back to the repo

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run briefing script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}
          PAGES_URL:         ${{ secrets.PAGES_URL }}
        run: python briefing.py

      - name: Commit and publish briefing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Daily briefing $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
